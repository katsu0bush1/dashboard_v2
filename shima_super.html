// a = 信号の強さ pow(|t|,0.55) × 標本信頼度 sh。ガンマで中間も鮮やか、収縮で少標本は淡く。
function heat(t,sh){t=Math.max(-1,Math.min(1,t));sh=(sh==null?1:sh);
 const a=Math.pow(Math.abs(t),0.55)*sh;
 return t>=0?rgb(lerp([110,122,134],[233,42,42],a)):rgb(lerp([110,122,134],[42,110,224],a));}
function colorFor(m,u){
 if(!u)return null;
 // 収縮: 標本(日数)が少ない台ほど淡く。1日=1/6, 5日=1/2, 14日≈0.74, 30日≈0.86
 const K=5, sh=(u.days||1)/((u.days||1)+K);
 if(m==='setting'){if(!u.est)return null;return heat((u.est.phigh-0.17)/0.22,1);} // ベイズが標本考慮済
 if(m==='ratio'){if(u.pr==null)return null;return heat((u.pr-100)/13,sh);}         // 基準 出率100%
 if(m==='diff'){return heat((u.d||0)/3200,sh);}                                    // 基準 差枚0
 if(m==='win'){return heat(((u.wr||0)-0.5)/0.22,sh);}                              // 基準 勝率50%

function render(){
